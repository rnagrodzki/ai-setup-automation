# Script execution tests for aisa-cache.
# These tests run cache-snapshot.js directly against real fixture directories (no LLM).
# They validate that the scripts the skill instructs Claude to use actually work correctly.
#
# Fixture appropriateness:
#   healthy-project -- CORRECT: has .claude/skills/ with 2 real skill files
#   empty-project   -- CORRECT (edge): no .claude/ directory

- description: "aisa-cache-exec: rebuild produces valid snapshot.json"
  vars:
    script_path: "repo://plugins/ai-setup-automation/scripts/cache-snapshot.js"
    script_args: "rebuild --project-root {{project_root}}"
    project_root: "file://fixtures-fs/healthy-project"
  assert:
    - type: icontains
      value: "snapshot"
    - type: icontains
      value: "rebuilt"
    - type: regex
      value: "[0-9]+ skills"

- description: "aisa-cache-exec: status reports freshness on existing cache"
  vars:
    script_path: "repo://plugins/ai-setup-automation/scripts/cache-snapshot.js"
    script_args: "status --project-root {{project_root}}"
    project_root: "file://fixtures-fs/healthy-project-with-cache"
  assert:
    - type: regex
      value: "(EXISTS|Skills cached)"
    - type: icontains
      value: "snapshot"

- description: "aisa-cache-exec: status on empty project reports MISSING"
  vars:
    script_path: "repo://plugins/ai-setup-automation/scripts/cache-snapshot.js"
    script_args: "status --project-root {{project_root}}"
    project_root: "file://fixtures-fs/empty-project"
  assert:
    - type: regex
      value: "(MISSING|not found|no cache|does not exist)"
