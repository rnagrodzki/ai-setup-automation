# Fixture appropriateness:
#   drifted-setup -- CORRECT: primary use case; checker classifies violations as OUTDATED/CRITICAL
#   healthy-setup -- CORRECT: validates all-CURRENT happy path
#   no-setup      -- CORRECT (edge): validates graceful handling when no .claude/ exists
#   learning-log  -- INVALID: learning log state doesn't affect skill structure health
#   minimal       -- INVALID: no project structure to check

- description: "aisa-inspect: drifted project shows OUTDATED classifications"
  vars:
    skill_path: "plugins/ai-setup-automation/skills/aisa-inspect/SKILL.md"
    project_context: "file://fixtures/drifted-setup.md"
    user_request: "Run /aisa-check on the project"
  assert:
    - type: regex
      value: "\\|.*\\|"
    - type: regex
      value: "(CURRENT|OUTDATED|STALE|CRITICAL)"
    - type: icontains
      value: "Health Check"
    - type: llm-rubric
      value: "The response produces a health check report that classifies at least one skill as OUTDATED or CRITICAL due to the structural violations in the project"
    # Cross-cutting: principle compliance (Rule 30, P1, P2, P3, Rule 11)
    - type: llm-rubric
      value: >
        Cross-cutting principle compliance check. Verify ALL of the following:
        1. NON-EMPTY OUTPUT: The response is a substantial, structured text report (not empty or near-empty). [Rule 30]
        2. LEARNING AWARENESS: The response mentions capturing learnings, discoveries, or references the learning log — OR explicitly states no new learnings were found. [P1]
        3. QUALITY EVIDENCE: The response shows evidence of validation, verification, or quality checking of its own output. [P2]
        4. CRITIQUE EVIDENCE: The response shows signs of self-critique or review before delivery (e.g., reviewing findings, validating classifications, checking for missed items). [P3]
        5. HONEST CONFIDENCE: No unsubstantiated claims of HIGH confidence or certainty without supporting evidence. [Rule 11]
        Score 1.0 if all 5 pass, 0.6 if 3-4 pass, 0.3 if 1-2 pass, 0.0 if none pass.
      threshold: 0.6

- description: "aisa-inspect: healthy project shows all CURRENT"
  vars:
    skill_path: "plugins/ai-setup-automation/skills/aisa-inspect/SKILL.md"
    project_context: "file://fixtures/healthy-setup.md"
    user_request: "Run /aisa-check on the project"
  assert:
    - type: icontains
      value: "CURRENT"
    - type: not-regex
      value: "\\|\\s*CRITICAL\\s*\\|"
    - type: llm-rubric
      value: "The response produces a health check report showing both skills as CURRENT with no critical issues"
    # Cross-cutting: principle compliance (Rule 30, P1, P2, P3, Rule 11)
    - type: llm-rubric
      value: >
        Cross-cutting principle compliance check. Verify ALL of the following:
        1. NON-EMPTY OUTPUT: The response is a substantial, structured text report (not empty or near-empty). [Rule 30]
        2. LEARNING AWARENESS: The response mentions capturing learnings, discoveries, or references the learning log — OR explicitly states no new learnings were found. [P1]
        3. QUALITY EVIDENCE: The response shows evidence of validation, verification, or quality checking of its own output. [P2]
        4. CRITIQUE EVIDENCE: The response shows signs of self-critique or review before delivery (e.g., reviewing findings, validating classifications, checking for missed items). [P3]
        5. HONEST CONFIDENCE: No unsubstantiated claims of HIGH confidence or certainty without supporting evidence. [Rule 11]
        Score 1.0 if all 5 pass, 0.6 if 3-4 pass, 0.3 if 1-2 pass, 0.0 if none pass.
      threshold: 0.6

- description: "aisa-inspect: no .claude/ directory reports nothing to check"
  vars:
    skill_path: "plugins/ai-setup-automation/skills/aisa-inspect/SKILL.md"
    project_context: "file://fixtures/no-setup.md"
    user_request: "Run /aisa-check on the project"
  assert:
    - type: llm-rubric
      value: "The response notes there is no .claude/ setup to check and does not fabricate health check results. It may recommend running aisa-init first."
    # Cross-cutting: principle compliance for edge cases (Rule 30, Rule 11)
    - type: llm-rubric
      value: >
        Cross-cutting principle compliance for edge cases. Verify:
        1. NON-EMPTY OUTPUT: The response is a structured text report, not empty or near-empty. [Rule 30]
        2. EXPLICIT NOTHING-FOUND: The response explicitly states what was not found or why no action was taken. [Rule 30]
        3. HONEST CONFIDENCE: No unsubstantiated claims without evidence. [Rule 11]
        Score 1.0 if all pass, 0.5 if only 1-2 pass, 0.0 if none pass.
      threshold: 0.5
