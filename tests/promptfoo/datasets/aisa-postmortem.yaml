# Fixture appropriateness:
#   healthy-setup -- CORRECT: incident descriptions reference data-processor/report-generator skills
#   drifted-setup -- CORRECT (alternate): could test incident mapping against broken skills
#   learning-log  -- CORRECT (alternate): could test interaction with existing learning entries
#   no-setup      -- INVALID: postmortem maps gaps to skills; no skills means no useful output
#   minimal       -- INVALID: same reason

- description: "aisa-postmortem: maps incident to skill gaps and creates learning entries"
  vars:
    skill_path: "plugins/ai-setup-automation/skills/aisa-postmortem/SKILL.md"
    project_context: "file://fixtures/healthy-setup.md"
    user_request: "Run /aisa:postmortem — incident: the data-processor skill didn't mention that CSV files from vendor X have BOM characters, causing a data import failure in production"
  assert:
    - type: icontains
      value: "data-processor"
    - type: regex
      value: "(Root Cause|root cause|skill gap|Skill Gap)"
    - type: llm-rubric
      value: "The response maps the BOM character issue to a gap in the data-processor skill, proposes adding a gotcha or warning about BOM characters, and creates or proposes a learning log entry"
    # Cross-cutting: principle compliance (Rule 30, P1, P2, P3, Rule 11)
    - type: llm-rubric
      value: >
        Cross-cutting principle compliance check. Verify ALL of the following:
        1. NON-EMPTY OUTPUT: The response is a substantial, structured text report (not empty or near-empty). [Rule 30]
        2. LEARNING AWARENESS: The response mentions capturing learnings, discoveries, or references the learning log — OR explicitly states no new learnings were found. [P1]
        3. QUALITY EVIDENCE: The response shows evidence of validation, verification, or quality checking of its own output. [P2]
        4. CRITIQUE EVIDENCE: The response shows signs of self-critique or review before delivery (e.g., reviewing findings, validating classifications, checking for missed items). [P3]
        5. HONEST CONFIDENCE: No unsubstantiated claims of HIGH confidence or certainty without supporting evidence. [Rule 11]
        Score 1.0 if all 5 pass, 0.6 if 3-4 pass, 0.3 if 1-2 pass, 0.0 if none pass.
      threshold: 0.6

- description: "aisa-postmortem: traces every fix to a specific root cause"
  vars:
    skill_path: "plugins/ai-setup-automation/skills/aisa-postmortem/SKILL.md"
    project_context: "file://fixtures/healthy-setup.md"
    user_request: "Run /aisa:postmortem — incident: a sync operation completed without validating skill structure, and a skill with broken frontmatter ended up deployed"
  assert:
    - type: regex
      value: "(Root Cause|root cause)"
    - type: regex
      value: "(validation|structural|frontmatter|corrupt)"
    - type: llm-rubric
      value: "The response identifies the root cause as a missing validation step in the skill workflow and proposes a specific addition to prevent unvalidated skills from being deployed"
    # Cross-cutting: principle compliance (Rule 30, P1, P2, P3, Rule 11)
    - type: llm-rubric
      value: >
        Cross-cutting principle compliance check. Verify ALL of the following:
        1. NON-EMPTY OUTPUT: The response is a substantial, structured text report (not empty or near-empty). [Rule 30]
        2. LEARNING AWARENESS: The response mentions capturing learnings, discoveries, or references the learning log — OR explicitly states no new learnings were found. [P1]
        3. QUALITY EVIDENCE: The response shows evidence of validation, verification, or quality checking of its own output. [P2]
        4. CRITIQUE EVIDENCE: The response shows signs of self-critique or review before delivery (e.g., reviewing findings, validating classifications, checking for missed items). [P3]
        5. HONEST CONFIDENCE: No unsubstantiated claims of HIGH confidence or certainty without supporting evidence. [Rule 11]
        Score 1.0 if all 5 pass, 0.6 if 3-4 pass, 0.3 if 1-2 pass, 0.0 if none pass.
      threshold: 0.6
